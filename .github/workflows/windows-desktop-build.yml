name: Windows desktop build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: windows-desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows exe
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: uv run --group dev python -m pytest -v

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build desktop executable
        working-directory: backend
        run: |
          uv run --extra desktop --extra build python -m PyInstaller ..\build\wingman.spec `
            --noconfirm `
            --clean `
            --distpath ..\release-dist `
            --workpath ..\release-build

      - name: Package Windows artifact
        id: package
        run: |
          $exePath = "release-dist\ai-chat-wingman.exe"
          if (-not (Test-Path $exePath)) {
            throw "Desktop executable was not created: $exePath"
          }

          if ("${{ github.ref_type }}" -eq "tag") {
            $suffix = "${{ github.ref_name }}"
          } else {
            $suffix = $env:GITHUB_SHA.Substring(0, 7)
          }

          $artifactName = "ai-chat-wingman-windows-$suffix"
          $releaseDir = "release"
          New-Item -ItemType Directory -Force $releaseDir | Out-Null
          Copy-Item $exePath "$releaseDir\$artifactName.exe" -Force
          Compress-Archive -Path "$releaseDir\$artifactName.exe" -DestinationPath "$releaseDir\$artifactName.zip" -Force

          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT
          "zip_path=$releaseDir\$artifactName.zip" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release for tags
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zipPath = "${{ steps.package.outputs.zip_path }}"
          $title = "AI Chat Wingman $tag"
          $notes = @"
          Automated Windows desktop build.

          This artifact contains the PyInstaller-packaged desktop executable.
          User data stays local under the configured AI Chat Wingman data directory.
          "@

          $releaseExists = $false
          try {
            gh release view $tag --json tagName *> $null
            $releaseExists = $LASTEXITCODE -eq 0
          } catch {
            $releaseExists = $false
          }

          if (-not $releaseExists) {
            gh release create $tag $zipPath --title $title --notes $notes --verify-tag
          } else {
            gh release upload $tag $zipPath --clobber
          }
